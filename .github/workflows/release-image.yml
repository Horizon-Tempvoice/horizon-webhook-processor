name: Release Docker Image

on:
  release:
    types: [published]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build:
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'src/**'

  push_to_registry:
    needs: changes
    runs-on: ubuntu-latest
    if: |
      always() && (
        github.event_name == 'release' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.build == 'true')
      )

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/horizon-tempvoice/horizon-webhook-processor
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=release,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

            type=raw,value=pre-release,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-') }}

            type=raw,value=nightly,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.build == 'true' }}
            type=raw,value=nightly-${{ github.sha }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.build == 'true' }}

            type=raw,value=dev-${{ github.sha }},enable=${{ github.event_name == 'push' }}

            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=edge-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short
            type=sha,format=long
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push with Jib
        run: |
          IMAGE_TAGS="${{ steps.meta.outputs.tags }}"
          MAIN_IMAGE=$(echo "$IMAGE_TAGS" | head -n 1)
          TAGS_ONLY=$(echo "$IMAGE_TAGS" | tail -n +2 | awk -F: '{print $NF}' | tr '\n' ',' | sed 's/,$//')

          ./gradlew --no-configuration-cache jib \
            -Djib.to.image="$MAIN_IMAGE" \
            -Djib.to.tags="$TAGS_ONLY" \
            -Djib.container.labels="$(echo "${{ steps.meta.outputs.labels }}" | tr '\n' ',' | sed 's/,$//')"

      - name: Create GitHub Release with Artifacts
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
