name: Build PR Image

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  packages: write

jobs:
  build_pr_image:
    name: Build and Push PR Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/horizon-tempvoice/horizon-webhook-processor
          tags: |
            type=raw,value=pr-${{ github.event.number }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push with Jib
        run: |
          IMAGE_TAGS="${{ steps.meta.outputs.tags }}"
          MAIN_IMAGE=$(echo "$IMAGE_TAGS" | head -n 1)

          ./gradlew --no-configuration-cache jib \
            -Djib.to.image="$MAIN_IMAGE" \
            -Djib.container.labels="$(echo "${{ steps.meta.outputs.labels }}" | tr '\n' ',' | sed 's/,$//')"
